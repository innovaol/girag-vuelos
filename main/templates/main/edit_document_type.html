{% extends "main/base_dashboard.html" %}

{% block title %}Editar Tipo de Documento{% endblock %}

{% block dashboard_content %}
<div class="container">
  <h2 class="mt-4">Editar Tipo de Documento: {{ doc_type.name }}</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Guardar Cambios</button>
    <a href="{% url 'manage_document_types' %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
