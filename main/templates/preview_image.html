<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vista Previa del Documento</title>
  <style>
    /* Centrar vertical y horizontalmente */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      height: 100vh;
      background-color: #f8f9fa;
    }
    /* La imagen se ajusta sin exceder el 100% del viewport */
    img {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <img src="data:{{ content_type }};base64,{{ image_data }}" alt="{{ filename }}">
</body>
</html>
